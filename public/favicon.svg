<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" fill="#2563eb" rx="45"/>
  
  <!-- Book icon -->
  <g transform="translate(48, 48)">
    <!-- Left page -->
    <rect x="10" y="20" width="50" height="80" fill="#ffffff" rx="2"/>
    <!-- Right page -->
    <rect x="65" y="20" width="50" height="80" fill="#e8eef7" rx="2"/>
    <!-- Spine -->
    <line x1="60" y1="20" x2="60" y2="100" stroke="#2563eb" stroke-width="3"/>
    <!-- Lines on left page -->
    <line x1="18" y1="32" x2="50" y2="32" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="18" y1="42" x2="50" y2="42" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="18" y1="52" x2="50" y2="52" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="18" y1="62" x2="42" y2="62" stroke="#cbd5e1" stroke-width="1"/>
  </g>
</svg>
